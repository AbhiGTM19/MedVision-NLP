name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set up git config
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config lfs.allowincompletepush true
          
          # Create a fresh orphan branch to completely bypass Git history
          git checkout --orphan hf-deploy
          git add -A
          
          # Force add the local Vector Database so HF Spaces receives it
          git add -f backend/data/chroma_db/ || true
          
          git commit -m "Automated deployment to Hugging Face Spaces"
          
          # Force push this single history-free commit to the HF Space
          git push -f https://abhshkgtm19:$HF_TOKEN@huggingface.co/spaces/abhshkgtm19/MedVision hf-deploy:main
