<!-- Fully Restructured Extended Footer Container -->
<!-- 'pt-24 pb-12' creates a taller padding envelope so contents do not crowd the enlarged wave graphic -->
<footer class="w-full mt-auto relative overflow-hidden bg-surface-container-low pt-12 pb-12">

    <!-- Background Animated Waves Container Layer -->
    <!-- Increased wrapper container block size from h-24 to h-40 to extend wave crest height -->
    <div class="absolute inset-x-0 bottom-0 h-40 pointer-events-none select-none z-0">
        <!-- Switched viewBox vertical bounding box from 900 to 450 to effectively double the scale depth of the paths -->
        <svg version="1.1" xmlns="http://w3.org" xmlns:xlink="http://w3.org" x="0px" y="0px" width="100%" height="100%"
            viewBox="0 0 1600 450" preserveAspectRatio="none">

                <!-- Gradient configuration optimized to fill the expanded wave shapes cleanly -->
                <linearGradient id="bg" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color: rgba(204, 204, 204, 0.18)"></stop>
                    <stop offset="100%" style="stop-color: rgba(255, 255, 255, 1)"></stop>
                </linearGradient>
                <!-- Adjusted paths to anchor at the lower viewport base limits -->
                <path id="wave" fill="url(#bg)"
                    d="M-363.852,150.589c0,0,236.988-41.997,505.475,0
              s371.981,38.998,575.971,0s293.985-39.278,505.474,5.859s493.475,48.368,716.963-4.995v300.106H-363.852V150.589z" />
            </defs>
            <g>
                <!-- Retained fluid easing values while shifting translation metrics to align with the new 450px aspect ratio grid -->
                <use xlink:href="#wave" opacity=".35">
                    <animateTransform attributeName="transform" attributeType="XML" type="translate" dur="9s"
                        calcMode="spline" values="270 50; -334 30; 270 50" keyTimes="0; .5; 1"
                        keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0" repeatCount="indefinite" />

                        keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0" repeatCount="indefinite" />
                </use>
                <use xlink:href="#wave" opacity=".95">
                    <animateTransform attributeName="transform" attributeType="XML" type="translate" dur="5s"
                        calcMode="spline" values="0 50;-140 30;0 50" keyTimes="0; .4; 1"
                        keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0" repeatCount="indefinite" />
                </use>
            </g>
        </svg>
    </div>
